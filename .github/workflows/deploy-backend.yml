name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'harbored-hope/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore harbored-hope/backend/HarboredHope.API.csproj

      - name: Build
        run: dotnet build harbored-hope/backend/HarboredHope.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish harbored-hope/backend/HarboredHope.API.csproj --configuration Release --no-build --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
